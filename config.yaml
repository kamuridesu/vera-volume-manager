veracrypt_path: /usr/bin/

secret_service:
  service_name: test
  username: kamuridesu

volume:
  folder: ./test
  name: test
  mount_point: /home/kamuri/mnt/veracrypt
  size: 10M
  filesystem: ExFAT

hooks:
  mount: ./script.sh .volume.mount_point
  umount: ./script.sh .volume.mount_point
  create: ./script.sh .volume.folder/.volume.name
  exit_on_failed: false

default_structure:
  - name: common
    children:
      - name: images
      - name: documents
        children:
          - name: pdf
          - name: word
          - name: excel
          - name: powerpoint
          - name: others
      - name: videos
      - name: music
      - name: projects
      - name: others
  - name: test
    children:
      - name: test1
      - name: test2
      - name: test3
      - name: test4
      - name: test5
